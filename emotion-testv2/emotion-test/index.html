<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Attention Tutor</title>

<script src="lib/face_mesh.js"></script>
<script src="lib/camera_utils.js"></script>
<script src="lib/drawing_utils.js"></script>
<script src="lib/face-api.min.js"></script>

<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  #container {
    position: relative;
    width: 640px;
    height: 480px;
  }

  video {
    position: absolute;
    top: 0;
    left: 0;
    width: 640px;
    height: 480px;
    transform: scaleX(-1); /* 镜像效果 */
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 640px;
    height: 480px;
  }

  #statusBox {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="container">
  <video id="video" autoplay muted playsinline width="640" height="480"></video>
  <canvas id="canvas" width="640" height="480"></canvas>
</div>

<div id="statusBox">
  Loading AI Tutor...
</div>

<!-- 主脚本 -->
<script src="script.js"></script>

</body>
</html>
